<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Yehudis Fine Art</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #f5f0eb; --dark: #1a1714; --gold: #c9a96e;
    --text: #3a3530; --muted: #8a8078; --bg: #eeebe6;
  }
  body { font-family: 'Cormorant Garamond', serif; background: var(--bg); color: var(--text); }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 48px;
    background: rgba(238,235,230,0.96); backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(58,53,48,0.08);
  }
  .nav-logo { font-family: 'Cinzel', serif; font-size: 1.1rem; letter-spacing: 0.12em; color: var(--text); text-decoration: none; }
  .nav-links { display: flex; gap: 32px; list-style: none; align-items: center; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.78rem; letter-spacing: 0.16em; text-transform: uppercase; transition: color 0.3s; }
  .nav-links a:hover, .nav-links a.active { color: var(--text); }
  .nav-lang { font-size: 0.75rem; letter-spacing: 0.12em; color: var(--muted); cursor: pointer; border: 1px solid rgba(58,53,48,0.2); padding: 4px 10px; border-radius: 2px; }

  .gallery-header { padding: 120px 48px 40px; text-align: center; }
  .gallery-label { font-size: 0.72rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .gallery-title { font-family: 'Cinzel', serif; font-size: clamp(2rem, 4vw, 3rem); font-weight: 400; color: var(--text); margin-bottom: 10px; }
  .gallery-sub { font-style: italic; color: var(--muted); font-size: 1rem; }

  .filters {
    display: flex; justify-content: center; gap: 0;
    border-bottom: 1px solid rgba(58,53,48,0.15);
    margin: 30px 48px 0;
  }
  .filter-btn {
    padding: 12px 32px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted); background: transparent; border: none;
    border-bottom: 2px solid transparent; cursor: pointer;
    transition: all 0.3s; position: relative; bottom: -1px;
  }
  .filter-btn.active { color: var(--text); border-bottom-color: var(--text); }
  .filter-btn:hover { color: var(--text); }

  .gallery-grid {
    padding: 40px 48px 80px;
    columns: 2; column-gap: 20px;
    max-width: 1100px; margin: 0 auto;
  }
  .gallery-item {
    break-inside: avoid; margin-bottom: 20px;
    cursor: pointer; position: relative; overflow: hidden;
    display: block;
  }
  .gallery-item img { width: 100%; display: block; transition: transform 0.5s ease; }
  .gallery-item:hover img { transform: scale(1.03); }
  .gallery-item-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(26,23,20,0.7) 0%, transparent 50%);
    opacity: 0; transition: opacity 0.4s;
    display: flex; align-items: flex-end; padding: 20px;
  }
  .gallery-item:hover .gallery-item-overlay { opacity: 1; }
  .gallery-item-title { color: white; font-style: italic; font-size: 1.1rem; }
  .gallery-item-label {
    position: absolute; bottom: 12px; left: 16px;
    background: rgba(26,23,20,0.75);
    color: white; font-size: 0.75rem; padding: 3px 10px;
    letter-spacing: 0.12em;
  }

  /* LIGHTBOX */
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(26,23,20,0.95);
    align-items: center; justify-content: center;
  }
  .lightbox.open { display: flex; }
  .lightbox-inner {
    display: grid; grid-template-columns: 1fr 1fr;
    max-width: 1000px; width: 90%;
    max-height: 90vh;
    background: rgba(30,26,22,0.98);
    position: relative;
    overflow: hidden;
  }
  .lightbox-img-wrap { background: #111; display: flex; align-items: center; justify-content: center; min-height: 500px; }
  .lightbox-img { max-width: 100%; max-height: 80vh; object-fit: contain; display: block; }
  .lightbox-info { padding: 50px 44px; overflow-y: auto; display: flex; flex-direction: column; justify-content: center; }
  .lb-series { font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
  .lb-title { font-family: 'Cinzel', serif; font-size: 1.8rem; font-weight: 400; color: var(--cream); margin-bottom: 6px; }
  .lb-hebrew { font-size: 1rem; color: var(--muted); margin-bottom: 28px; }
  .lb-row { margin-bottom: 8px; }
  .lb-row-label { font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
  .lb-row-val { font-size: 1rem; color: var(--cream); margin-top: 2px; }
  .lb-divider { width: 100%; height: 1px; background: rgba(245,240,235,0.08); margin: 20px 0; }
  .lb-story-label { font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .lb-story { font-style: italic; font-size: 0.98rem; color: rgba(245,240,235,0.6); line-height: 1.7; }
  .lb-inquire {
    margin-top: 28px; display: inline-block;
    padding: 12px 28px; border: 1px solid rgba(201,169,110,0.5);
    color: var(--gold); font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase;
    text-decoration: none; transition: all 0.3s; cursor: pointer; background: transparent;
    font-family: 'Cormorant Garamond', serif;
  }
  .lb-inquire:hover { background: rgba(201,169,110,0.1); border-color: var(--gold); }
  .lightbox-close {
    position: absolute; top: 18px; right: 22px;
    background: none; border: none; cursor: pointer;
    font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(245,240,235,0.45); transition: color 0.3s;
    font-family: 'Cormorant Garamond', serif;
  }
  .lightbox-close:hover { color: var(--cream); }

  footer { background: var(--dark); padding: 50px 48px 30px; border-top: 1px solid rgba(245,240,235,0.06); }
  .footer-inner { display: flex; justify-content: space-between; align-items: center; }
  .footer-logo { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--cream); text-decoration: none; letter-spacing: 0.15em; }
  .footer-links-row { display: flex; gap: 28px; }
  .footer-links-row a { color: rgba(245,240,235,0.4); text-decoration: none; font-size: 0.8rem; letter-spacing: 0.12em; transition: color 0.3s; }
  .footer-links-row a:hover { color: var(--cream); }
  .footer-bottom2 { padding: 16px 48px; background: var(--dark); border-top: 1px solid rgba(245,240,235,0.04); color: rgba(245,240,235,0.2); font-size: 0.72rem; text-align: center; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Yehudis</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="gallery.html" class="active">Gallery</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><span class="nav-lang">EN · עב</span></li>
  </ul>
</nav>

<div class="gallery-header">
  <p class="gallery-label">Original Works</p>
  <h1 class="gallery-title">Gallery</h1>
  <p class="gallery-sub">Available for private acquisition · Each work unique</p>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="soul">Soul</button>
  <button class="filter-btn" data-filter="story">Story</button>
  <button class="filter-btn" data-filter="light">Light</button>
</div>

<div class="gallery-grid" id="galleryGrid">
  <!-- Items injected by JS -->
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-inner">
    <div class="lightbox-img-wrap">
      <img class="lightbox-img" id="lbImg" src="" alt="">
    </div>
    <div class="lightbox-info">
      <p class="lb-series" id="lbSeries"></p>
      <h2 class="lb-title" id="lbTitle"></h2>
      <p class="lb-hebrew" id="lbHebrew"></p>
      <div class="lb-row">
        <div class="lb-row-label">Medium</div>
        <div class="lb-row-val" id="lbMedium"></div>
      </div>
      <div class="lb-row">
        <div class="lb-row-label">Size</div>
        <div class="lb-row-val" id="lbSize"></div>
      </div>
      <div class="lb-row">
        <div class="lb-row-label">Status</div>
        <div class="lb-row-val" id="lbStatus"></div>
      </div>
      <div class="lb-divider"></div>
      <div class="lb-story-label">The Story Behind</div>
      <p class="lb-story" id="lbStory"></p>
      <button class="lb-inquire" onclick="window.location='contact.html'">Inquire About This Work</button>
    </div>
    <button class="lightbox-close" onclick="closeLightbox()">Close ✕</button>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <a href="index.html" class="footer-logo">Yehudis</a>
    <div class="footer-links-row">
      <a href="gallery.html">Gallery</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>
</footer>
<div class="footer-bottom2">© 2025 Yehudis Fine Art · Jerusalem, Israel</div>

<script>
const paintings = [
  { title: 'At Sinai', hebrew: 'בסיני', series: 'Story', medium: 'Oil on canvas', size: 'Large format', status: 'Available', story: '"We were all there — not our ancestors, but us, in the part of us that does not die. The mountain is not geography. It is a state of the soul."', img: 'https://images.unsplash.com/photo-1541961017774-22349e4a1262?w=700&q=80', aspect: 'tall' },
  { title: 'The Elders', hebrew: 'הזקנים', series: 'Soul', medium: 'Oil on canvas', size: 'Large format', status: 'Available', story: 'Faces that carry generations — the weight of wisdom carried without effort, love without condition.', img: 'https://images.unsplash.com/photo-1578321272176-b7bbc0679853?w=700&q=80', aspect: 'square' },
  { title: 'Blooming', hebrew: 'פריחה', series: 'Light', medium: 'Oil on canvas', size: 'Medium', status: 'Available', story: 'What blooms in darkness has a light all its own. A gift given only to those who waited.', img: 'https://images.unsplash.com/photo-1578301978693-85fa9c0320b9?w=700&q=80', aspect: 'square' },
  { title: 'Divine Sinai', hebrew: 'סיני האלוהי', series: 'Story', medium: 'Oil on canvas', size: 'Large format', status: 'Available', story: 'The mountain dissolves into presence. The landscape becomes memory, and memory becomes light.', img: 'https://images.unsplash.com/photo-1580136579312-94651dfd596d?w=700&q=80', aspect: 'tall' },
  { title: 'Soul', hebrew: 'נשמה', series: 'Soul', medium: 'Oil on canvas', size: 'Medium', status: 'Sold', story: 'The innermost breath of being. Not seen, only felt — a color that has no name.', img: 'https://images.unsplash.com/photo-1596548438137-d51ea5c83ca5?w=700&q=80', aspect: 'square' },
  { title: 'He Is Not an Angel', hebrew: 'הוא לא מלאך', series: 'Story', medium: 'Oil on canvas', size: 'Large', status: 'Available', story: 'The line between human and divine is made of fire — and love alone can walk across it.', img: 'https://images.unsplash.com/photo-1580136579312-94651dfd596d?w=700&q=80', aspect: 'square' },
];

const grid = document.getElementById('galleryGrid');

function renderGallery(filter) {
  grid.innerHTML = '';
  paintings.filter(p => filter === 'all' || p.series.toLowerCase() === filter).forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'gallery-item';
    div.innerHTML = `
      <img src="${p.img}" alt="${p.title}" style="${p.aspect === 'tall' ? 'height:480px;object-fit:cover;width:100%' : ''}">
      <div class="gallery-item-overlay">
        <div class="gallery-item-title">${p.title}</div>
      </div>
    `;
    div.addEventListener('click', () => openLightbox(i));
    grid.appendChild(div);
  });
}

let currentFilter = 'all';
renderGallery('all');

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderGallery(currentFilter);
  });
});

function openLightbox(i) {
  const filtered = paintings.filter(p => currentFilter === 'all' || p.series.toLowerCase() === currentFilter);
  const p = filtered[i];
  document.getElementById('lbImg').src = p.img;
  document.getElementById('lbSeries').textContent = p.series;
  document.getElementById('lbTitle').textContent = p.title;
  document.getElementById('lbHebrew').textContent = p.hebrew;
  document.getElementById('lbMedium').textContent = p.medium;
  document.getElementById('lbSize').textContent = p.size;
  document.getElementById('lbStatus').textContent = p.status;
  document.getElementById('lbStory').textContent = p.story;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
</script>
</body>
</html>
